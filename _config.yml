# ==============================================================================
# SITE SETTINGS
# ==============================================================================
locale: "en-US"
minimal_mistakes_skin: "air"
title: "Jose A. Guridi"
title_separator: "-"
name: &name "Jose A. Guridi"
description: &description "PhD Candidate in Information Science at Cornell University. Researching AI governance, policy, and participatory design."
url: "https://jaguridi.github.io"
baseurl: ""
repository: "jaguridi/jaguridi.github.io"

# ==============================================================================
# AUTHOR SIDEBAR
# ==============================================================================
author:
  name: "Jose A. Guridi"
  avatar: "profile.png" # Ensure this file is in /images/
  pronouns: "he/him"
  bio: "PhD Candidate in Information Science, Cornell University"
  location: "Ithaca, NY & Santiago, Chile"
  email: "jg2222@cornell.edu"
  uri: "http://www.foresight.cl/"
  
  # Social Links
  googlescholar: "https://scholar.google.com/citations?user=P5xFVC4AAAAJ&hl=en"
  orcid: "https://orcid.org/0000-0003-0543-699X"
  researchgate: "https://www.researchgate.net/profile/Jose-Guridi-2"
  linkedin: "jaguridi"
  github: "jaguridi"

  # Custom Buttons
  links:
    - label: "CV"
      url: "files/Jose_Guridi_CV.pdf"
      icon: "fas fa-fw fa-file-pdf"
    - label: "Foresight Consulting"
      url: "http://www.foresight.cl/"
      icon: "fas fa-fw fa-briefcase"

# ==============================================================================
# SYSTEM DEFAULTS
# ==============================================================================
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: teaching
    values:
      layout: single
      author_profile: true
      share: true
      comments: true
  - scope:
      path: ""
      type: publications
    values:
      layout: single
      author_profile: true
      share: true
      comments: true
  - scope:
      path: ""
      type: talks
    values:
      layout: talk
      author_profile: true
      share: true

# ==============================================================================
# OTHER SETTINGS
# ==============================================================================
search: true
search_full_content: true
words_per_minute: 160
future: true
read_more: "disabled"
talkmap_link: false
compress_html:
  clippings: all
  ignore:
    envs: development

# Categories
publication_category:
  books:
    title: 'Book Chapters'
  manuscripts:
    title: 'Journal Articles'    
  conferences:
    title: 'Conference Papers'

# Collections
collections:
  teaching:
    output: true
    permalink: /:collection/:path/
  publications:
    output: true
    permalink: /:collection/:path/
  portfolio:
    output: true
    permalink: /:collection/:path/
  talks:
    output: true
    permalink: /:collection/:path/

# Plugins
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

plugins:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

whitelist:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

# Analytics
analytics:
  provider: "false"
